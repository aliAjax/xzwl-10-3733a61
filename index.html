<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>星星收集者 - Star Collector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-container">
    <header class="game-header">
      <h1 class="game-title">✨ 星星收集者 ✨</h1>
    </header>

    <div class="status-bar">
      <div class="status-item lives">
        <span class="status-label">生命</span>
        <span class="status-value" id="lives">❤️❤️❤️</span>
      </div>
      <div class="status-item level">
        <span class="status-label">等级</span>
        <span class="status-value" id="level">1</span>
      </div>
      <div class="status-item score">
        <span class="status-label">分数</span>
        <span class="status-value" id="score">0</span>
      </div>
      <div class="status-item high-score">
        <span class="status-label">最高分</span>
        <span class="status-value" id="highScore">0</span>
      </div>
    </div>

    <div class="challenge-progress-bar hidden" id="challengeProgressBar">
      <div class="challenge-progress-icon" id="challengeProgressIcon">🎯</div>
      <div class="challenge-progress-content">
        <div class="challenge-progress-text">
          <span id="challengeProgressLabel">挑战</span>
          <span id="challengeProgressValue">0 / 0</span>
        </div>
        <div class="challenge-progress-track">
          <div class="challenge-progress-fill" id="challengeProgressFill"></div>
        </div>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="800" height="600"></canvas>
      
      <div class="overlay" id="startOverlay">
        <div class="overlay-content">
          <h2 class="overlay-title">🌟 准备好了吗？</h2>
          <p class="overlay-desc">收集星星获得分数，躲避红色陨石保护生命</p>
          <p class="overlay-tips">键盘：方向键 或 WASD 移动 | 触屏：使用下方虚拟按键</p>
          
          <div class="daily-challenge-card" id="dailyChallengeCard">
            <div class="challenge-card-header">
              <span class="challenge-card-badge">📅 今日挑战</span>
              <span class="challenge-card-status" id="challengeCardStatus">进行中</span>
            </div>
            <div class="challenge-card-body">
              <div class="challenge-card-icon" id="challengeCardIcon">🎯</div>
              <div class="challenge-card-info">
                <div class="challenge-card-title" id="challengeCardTitle">加载中...</div>
                <div class="challenge-card-desc" id="challengeCardDesc">请稍候...</div>
              </div>
            </div>
            <div class="challenge-card-footer">
              <div class="challenge-reward-text">完成可获得今日成就徽章</div>
            </div>
          </div>
          
          <button class="btn btn-secondary" id="skinsBtnStart">🎨 皮肤收藏</button>
          <button class="btn btn-primary" id="startBtn">开始游戏</button>
        </div>
      </div>

      <div class="overlay hidden" id="pauseOverlay">
        <div class="overlay-content">
          <h2 class="overlay-title">⏸️ 游戏暂停</h2>
          <p class="overlay-desc">休息一下，准备好了再继续</p>
          <button class="btn btn-primary" id="resumeBtn">继续游戏</button>
          <button class="btn btn-secondary" id="restartFromPauseBtn">重新开始</button>
        </div>
      </div>

      <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-content">
          <h2 class="overlay-title">💫 游戏结束</h2>
          <p class="final-score">最终得分：<span id="finalScore">0</span></p>
          <p class="high-score-text">最高分：<span id="finalHighScore">0</span></p>
          <p class="new-record hidden" id="newRecord">🎉 新纪录！</p>
          
          <div class="challenge-result-card" id="challengeResultCard">
            <div class="challenge-result-header">
              <span class="challenge-result-icon" id="challengeResultIcon">🎯</span>
              <span class="challenge-result-title">今日挑战</span>
            </div>
            <div class="challenge-result-body">
              <div class="challenge-result-name" id="challengeResultName">--</div>
              <div class="challenge-result-desc" id="challengeResultDesc">--</div>
              <div class="challenge-result-status" id="challengeResultStatus">--</div>
              <div class="challenge-result-progress">
                <div class="challenge-result-progress-track">
                  <div class="challenge-result-progress-fill" id="challengeResultProgressFill"></div>
                </div>
                <div class="challenge-result-progress-text" id="challengeResultProgressText">0%</div>
              </div>
            </div>
          </div>
          
          <button class="btn btn-primary" id="restartBtn">再来一局</button>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-control" id="pauseBtn" disabled>暂停</button>
      <button class="btn btn-control" id="restartBtn2" disabled>重新开始</button>
      <button class="btn btn-control" id="skinsBtn">🎨 皮肤</button>
      <button class="btn btn-control" id="achievementsBtn">🏆 成就</button>
      <button class="btn btn-control" id="statsBtn">📊 统计</button>
      <button class="btn btn-control" id="settingsBtn">⚙️ 设置</button>
    </div>

    <div class="touch-controls" id="touchControls">
      <div class="touch-row">
        <button class="touch-btn" data-direction="up">▲</button>
      </div>
      <div class="touch-row">
        <button class="touch-btn" data-direction="left">◀</button>
        <button class="touch-btn" data-direction="down">▼</button>
        <button class="touch-btn" data-direction="right">▶</button>
      </div>
    </div>

    <div class="achievement-toast-container" id="achievementToastContainer"></div>

    <div class="achievements-overlay hidden" id="achievementsOverlay">
      <div class="achievements-panel">
        <div class="achievements-header">
          <h2 class="achievements-title">🏆 成就列表</h2>
          <div class="achievements-progress">
            <span id="achievementsProgress">0 / 4</span>
          </div>
          <button class="achievements-close" id="achievementsCloseBtn">✕</button>
        </div>
        <div class="achievements-content" id="achievementsContent">
        </div>
      </div>
    </div>

    <div class="settings-overlay hidden" id="settingsOverlay">
      <div class="settings-panel">
        <div class="settings-header">
          <h2 class="settings-title">⚙️ 游戏设置</h2>
          <button class="settings-close" id="settingsCloseBtn">✕</button>
        </div>
        <div class="settings-content">
          <div class="setting-item">
            <div class="setting-label">
              <span class="setting-icon">🔊</span>
              <span>音效开关</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="soundToggle" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="setting-item">
            <div class="setting-label">
              <span class="setting-icon">🚀</span>
              <span>移动速度</span>
            </div>
            <div class="speed-selector">
              <button class="speed-btn" data-speed="slow">慢</button>
              <button class="speed-btn active" data-speed="normal">中</button>
              <button class="speed-btn" data-speed="fast">快</button>
            </div>
          </div>

          <div class="setting-item">
            <div class="setting-label">
              <span class="setting-icon">🎮</span>
              <span>触屏按键</span>
            </div>
            <div class="touch-mode-selector">
              <button class="touch-mode-btn active" data-mode="auto">自动</button>
              <button class="touch-mode-btn" data-mode="always">始终显示</button>
              <button class="touch-mode-btn" data-mode="hide">隐藏</button>
            </div>
          </div>
        </div>
        <div class="settings-footer">
          <button class="btn btn-secondary" id="settingsResetBtn">恢复默认</button>
        </div>
      </div>
    </div>

    <div class="stats-overlay hidden" id="statsOverlay">
      <div class="stats-panel">
        <div class="stats-header">
          <h2 class="stats-title">📊 游戏统计</h2>
          <button class="stats-close" id="statsCloseBtn">✕</button>
        </div>
        <div class="stats-content" id="statsContent">
        </div>
      </div>
    </div>

    <div class="skins-overlay hidden" id="skinsOverlay">
      <div class="skins-panel">
        <div class="skins-header">
          <h2 class="skins-title">🎨 皮肤收藏</h2>
          <div class="skins-progress">
            <span id="skinsProgress">0 / 5</span>
          </div>
          <button class="skins-close" id="skinsCloseBtn">✕</button>
        </div>
        <div class="skins-tabs">
          <button class="skin-tab active" data-tab="player">👤 外观</button>
          <button class="skin-tab" data-tab="trail">✨ 拖尾</button>
          <button class="skin-tab" data-tab="effect">💫 特效</button>
        </div>
        <div class="skins-content" id="skinsContent">
        </div>
        <div class="skins-footer">
          <div class="skins-preview" id="skinsPreview">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
